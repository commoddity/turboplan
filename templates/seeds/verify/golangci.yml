# https://golangci-lint.run/docs/configuration/file/
# Bootstrap adapts this to the project root as .golangci.yml
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - revive

  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: var-naming
        - name: package-comments
          disabled: true

  exclusions:
    generated: lax
    rules:
      - path: cmd/
        text: "package-comments"
      - path: (.+)\.go$
        text: "stutters"
      - path: (.+)\.go$
        text: "should have comment"
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
